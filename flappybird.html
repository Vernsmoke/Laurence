<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Sky Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Righteous&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #FFA07A 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            animation: float-cloud 20s linear infinite;
        }
        
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }
        
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 10%;
            left: -150px;
            animation-duration: 25s;
        }
        
        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }
        
        .cloud1::after {
            width: 60px;
            height: 40px;
            top: -15px;
            right: 10px;
        }
        
        .cloud2 {
            width: 120px;
            height: 45px;
            top: 30%;
            left: -180px;
            animation-duration: 30s;
            animation-delay: 5s;
        }
        
        .cloud2::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 15px;
        }
        
        .cloud2::after {
            width: 70px;
            height: 45px;
            top: -20px;
            right: 15px;
        }
        
        .cloud3 {
            width: 90px;
            height: 35px;
            top: 60%;
            left: -130px;
            animation-duration: 22s;
            animation-delay: 10s;
        }
        
        .cloud3::before {
            width: 45px;
            height: 45px;
            top: -20px;
            left: 8px;
        }
        
        .cloud3::after {
            width: 55px;
            height: 35px;
            top: -12px;
            right: 8px;
        }
        
        @keyframes float-cloud {
            0% {
                left: -200px;
            }
            100% {
                left: 110%;
            }
        }
        
        .game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 100%);
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(255, 255, 255, 0.2);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .score {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Righteous', cursive;
            font-size: 5rem;
            color: #fff;
            text-shadow: 
                4px 4px 0px #FF6B6B,
                8px 8px 0px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }
        
        .start-screen,
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 20;
            pointer-events: all;
        }
        
        .start-screen.hidden,
        .game-over-screen.hidden {
            display: none;
        }
        
        .title {
            font-family: 'Righteous', cursive;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 
                4px 4px 0px #FF6B6B,
                8px 8px 0px #4ECDC4,
                12px 12px 0px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        .subtitle {
            font-size: 1.5rem;
            color: #FFD93D;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .btn {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 1.5rem 3.5rem;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: all;
        }
        
        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.7);
        }
        
        .btn:active {
            transform: translateY(-2px) scale(1.02);
        }
        
        .instructions {
            margin-top: 2rem;
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
        }
        
        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            margin: 0 0.5rem;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            gap: 3rem;
            margin-top: 2rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #FFD93D;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-family: 'Righteous', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 3px 3px 0px #FF6B6B;
        }
        
        .medal {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        /* Confetti */
        #confettiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--confetti-color);
            top: -10px;
        }
        
        @keyframes confetti-fall {
            to {
                transform: translateY(120vh) translateX(var(--drift)) rotate(var(--rotation));
                opacity: 0;
            }
        }
        
        /* Flash overlay */
        #flashOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.1s;
        }
        
        #flashOverlay.active {
            opacity: 0.8;
        }
        
        /* Distraction bars */
        #barsContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .distraction-bar {
            position: absolute;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 107, 107, 0.8), 
                transparent);
            animation: slide-bar 2s ease-in-out forwards;
        }
        
        .distraction-bar.horizontal {
            width: 100%;
            height: 40px;
            left: 0;
        }
        
        .distraction-bar.vertical {
            width: 40px;
            height: 100%;
            top: 0;
        }
        
        @keyframes slide-bar {
            0% {
                transform: translateX(-100%);
            }
            50% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        /* Screen shake */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-10px, 5px); }
            20% { transform: translate(10px, -5px); }
            30% { transform: translate(-10px, -5px); }
            40% { transform: translate(10px, 5px); }
            50% { transform: translate(-10px, 5px); }
            60% { transform: translate(10px, -5px); }
            70% { transform: translate(-10px, -5px); }
            80% { transform: translate(10px, 5px); }
            90% { transform: translate(-10px, 5px); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        /* Sound toggle */
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            z-index: 30;
            pointer-events: all;
        }
        
        .sound-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="game-ui">
            <div id="confettiContainer"></div>
            <div id="flashOverlay"></div>
            <div id="barsContainer"></div>
            
            <div class="score" id="score">0</div>
            
            <button class="sound-toggle" id="soundToggle">🔊</button>
            
            <div class="start-screen" id="startScreen">
                <div class="title">Flappy Bird</div>
                <div class="subtitle">🐦 Sky Adventure 🌤️</div>
                <button class="btn" onclick="startGame()">Start Game</button>
                <div class="instructions">
                    Press <span class="key-hint">SPACE</span> or <span class="key-hint">CLICK</span> to fly
                </div>
            </div>
            
            <div class="game-over-screen hidden" id="gameOverScreen">
                <div class="medal" id="medal">🎖️</div>
                <div class="title">Game Over!</div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Score</div>
                        <div class="stat-value" id="finalScore">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Best</div>
                        <div class="stat-value" id="bestScore">0</div>
                    </div>
                </div>
                <button class="btn" onclick="restartGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Make canvas fullscreen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game variables
        let gameActive = false;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestScore') || 0;
        let frameCount = 0;
        let soundEnabled = true;
        
        // Distraction variables
        let lastDistraction = 0;
        let barsActive = false;
        
        // Bird
        const bird = {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.6,
            jump: -10,
            rotation: 0
        };
        
        // Pipes
        let pipes = [];
        const pipeWidth = 80;
        const pipeGap = 200;
        const pipeSpeed = 3;
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameActive) {
                e.preventDefault();
                flap();
            }
        });
        
        canvas.addEventListener('click', () => {
            if (gameActive) {
                flap();
            }
        });
        
        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
        });
        
        // Start game
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameActive = true;
            score = 0;
            pipes = [];
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            frameCount = 0;
            lastDistraction = 0;
            updateScore();
            gameLoop();
        }
        
        // Restart game
        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }
        
        // Flap
        function flap() {
            bird.velocity = bird.jump;
            playSound('flap');
        }
        
        // Game loop
        function gameLoop() {
            if (!gameActive) return;
            
            update();
            draw();
            frameCount++;
            
            requestAnimationFrame(gameLoop);
        }
        
        // Update game state
        function update() {
            // Update bird position
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Rotate bird based on velocity
            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);
            
            // Update bird position based on screen size
            bird.x = canvas.width * 0.2;
            
            // Create pipes
            if (frameCount % 90 === 0) {
                const minHeight = 100;
                const maxHeight = canvas.height - pipeGap - 100;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                
                pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + pipeGap,
                    scored: false
                });
            }
            
            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;
                
                // Score when passing pipe
                if (!pipe.scored && pipe.x + pipeWidth < bird.x) {
                    pipe.scored = true;
                    score++;
                    updateScore();
                    playSound('score');
                }
                
                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });
            
            // Check collisions
            checkCollisions();
            
            // Trigger distractions
            triggerDistractions();
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw ground
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            ctx.fillStyle = '#7CB342';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, canvas.height - 50, 20, 50);
            }
            
            // Draw pipes
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillStyle = '#388E3C';
                ctx.fillRect(pipe.x, pipe.topHeight - 30, pipeWidth, 30);
                
                // Bottom pipe
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
                ctx.fillStyle = '#388E3C';
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, 30);
                
                // Pipe highlights
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(pipe.x + 5, 0, 8, pipe.topHeight);
                ctx.fillRect(pipe.x + 5, pipe.bottomY, 8, canvas.height - pipe.bottomY);
            });
            
            // Draw bird
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.rotation * Math.PI / 180);
            
            // Bird body
            ctx.fillStyle = '#FFD93D';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Wing
            ctx.fillStyle = '#FF8E53';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 15, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye white
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(10, -5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye pupil
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(12, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, -3);
            ctx.lineTo(25, 3);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        // Check collisions
        function checkCollisions() {
            // Ground and ceiling
            if (bird.y + bird.height >= canvas.height - 50 || bird.y <= 0) {
                gameOver();
                return;
            }
            
            // Pipes
            pipes.forEach(pipe => {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        gameOver();
                    }
                }
            });
        }
        
        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // Game over
        function gameOver() {
            gameActive = false;
            playSound('hit');
            
            // Update best score
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }
            
            // Show medal based on score
            let medal = '';
            if (score >= 50) medal = '🥇';
            else if (score >= 30) medal = '🥈';
            else if (score >= 10) medal = '🥉';
            else medal = '🎖️';
            
            document.getElementById('medal').textContent = medal;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // Simple sound effects using Web Audio API
        function playSound(type) {
            if (!soundEnabled) return;
            
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'flap':
                    oscillator.frequency.value = 400;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                    
                case 'score':
                    oscillator.frequency.value = 800;
                    oscillator.type = 'square';
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                    
                case 'hit':
                    oscillator.frequency.value = 100;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                    break;
            }
        }
        
        // DISTRACTION FUNCTIONS - INCREASED FREQUENCY
        
        // Trigger distractions more frequently
        function triggerDistractions() {
            const timeSinceLastDistraction = frameCount - lastDistraction;
            
            // Start distractions earlier and more often (score >= 3 instead of 5)
            if (score >= 3 && timeSinceLastDistraction > 90) { // Every 1.5 seconds instead of 3
                const random = Math.random();
                
                if (random < 0.35) {
                    createConfettiBurst();
                } else if (random < 0.6) {
                    createFlash();
                } else if (random < 0.8) {
                    createMovingBars();
                } else {
                    createScreenShake();
                }
                
                lastDistraction = frameCount;
            }
            
            // More intense distractions at lower scores (score >= 8 instead of 15)
            if (score >= 8 && timeSinceLastDistraction > 60) { // Every second
                if (Math.random() < 0.5) {
                    createConfettiBurst();
                    createFlash();
                }
                lastDistraction = frameCount;
            }
            
            // Chaos mode at lower scores (score >= 15 instead of 25)
            if (score >= 15 && timeSinceLastDistraction > 45) { // Every 0.75 seconds
                if (Math.random() < 0.6) {
                    createConfettiBurst();
                    createMovingBars();
                    setTimeout(createFlash, 200);
                }
                lastDistraction = frameCount;
            }
            
            // EXTREME chaos mode at score >= 25
            if (score >= 25 && timeSinceLastDistraction > 30) { // Every 0.5 seconds
                if (Math.random() < 0.7) {
                    createConfettiBurst();
                    createMovingBars();
                    createScreenShake();
                    setTimeout(createFlash, 100);
                }
                lastDistraction = frameCount;
            }
        }
        
        // Create confetti burst (increased amount)
        function createConfettiBurst() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCF7F', '#A78BFA', '#FB7185'];
            
            for (let i = 0; i < 50; i++) { // Increased from 30 to 50
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.setProperty('--confetti-color', colors[Math.floor(Math.random() * colors.length)]);
                confetti.style.setProperty('--rotation', Math.random() * 360 + 'deg');
                confetti.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
                confetti.style.animation = `confetti-fall ${2 + Math.random() * 2}s linear forwards`;
                confetti.style.animationDelay = Math.random() * 0.3 + 's';
                
                container.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 4500);
            }
        }
        
        // Create flash effect
        function createFlash() {
            const flash = document.getElementById('flashOverlay');
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 300);
        }
        
        // Create moving bars (increased count)
        function createMovingBars() {
            if (barsActive) return;
            barsActive = true;
            
            const container = document.getElementById('barsContainer');
            const barCount = 3 + Math.floor(Math.random() * 3); // Increased from 2-3 to 3-5
            
            for (let i = 0; i < barCount; i++) {
                const bar = document.createElement('div');
                bar.className = 'distraction-bar';
                
                if (Math.random() < 0.5) {
                    bar.classList.add('horizontal');
                    bar.style.top = (Math.random() * 80 + 10) + '%';
                } else {
                    bar.classList.add('vertical');
                    bar.style.left = (Math.random() * 80 + 10) + '%';
                }
                
                container.appendChild(bar);
                
                setTimeout(() => {
                    bar.remove();
                    if (container.children.length === 0) {
                        barsActive = false;
                    }
                }, 3000);
            }
        }
        
        // Create screen shake
        function createScreenShake() {
            const gameContainer = document.querySelector('.game-container');
            gameContainer.classList.add('shake');
            setTimeout(() => gameContainer.classList.remove('shake'), 500);
        }
        
        // Initial draw
        draw();
    </script>
</body>
</html>
