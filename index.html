 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Hub</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
        }

         .navbar {
            background-color: #000;
            padding: 20px 40px;
            border-bottom: 3px solid #ff9000;
            display: flex;
            justify-content: space-between;
            align-items: center;
       
        }
        
        .logo {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .hub {
            background-color: #ff9000;
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
        }

        p {
            font-size: 20px;
            margin: 10px 0;
        }

        .btn {
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            margin: 20px 10px;
            display: inline-block;
        }

        .btn-yes {
            background-color: #ff9000;
            color: #000;
        }

        .btn-no {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="logo">Port<span class="hub">Hub</span></div>
    <p>This portfolio is for educational purposes.</p>
    <p>Do you want to proceed?</p>
    <br>
    <a href="home.html" class="btn btn-yes">I am 18 or older - Enter</a>
    <a href="exit.html" class="btn btn-no">I am under 18 - Exit</a>
</body>
</html>
